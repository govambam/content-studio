[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Surface the commit SHA into the API process so pino's base block and
# `/api/health` can echo it. Railway injects RAILWAY_GIT_COMMIT_SHA into
# every build; reading it at runtime means no CI pipeline changes.
[deploy.variables]
RELEASE_SHA = "${{RAILWAY_GIT_COMMIT_SHA}}"
